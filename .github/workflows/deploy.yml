name: Deploy RDV SERVICE

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # Permet déclenchement manuel

env:
  COMPOSE_FILE: compose.yaml
  ECR_REPOSITORY: rdv/rdvservice
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          # Construire l'image Docker
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push image to Amazon ECR
        run: |
          # Vérifier si le repository existe, sinon le créer
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} || aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }}
          
          # Push les images
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

#      - name: Create SSH Key
#        uses: shimataro/ssh-key-action@v2
#        with:
#          key: ${{ secrets.SSH_PRIVATE_KEY }}
#          known_hosts: unnecessary

      - name: Setup SSH and known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add server to known_hosts
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # Verify
          cat ~/.ssh/known_hosts

      - name: Copy Docker Compose to EC2
        run: |
          scp ${{ env.COMPOSE_FILE }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/rdvservice/compose.yml

      - name: Create .env file on EC2
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            mkdir -p ~/rdvservice
            cat > ~/rdvservice/.env << EOF
            ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            ECR_REPOSITORY=${{ env.ECR_REPOSITORY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_PROFILES_ACTIVE=prod
            EOF
          "

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            cd ~/rdvservice
          
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
          
            # Pull latest images
            docker compose -f compose.yml pull
          
            # Stop and remove old containers
            docker compose -f compose.yml down || true
          
            # Remove old images (optional)
            docker system prune -f
          
            # Start new stack
            docker compose -f compose.yml up -d
          
            # Check if containers are running
            sleep 10
            docker compose -f compose.yml ps
          "

      - name: Health Check
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            cd ~/rdvservice
          
            # Check container status
            if docker compose -f compose.yml ps | grep -q 'Up'; then
              echo '✅ Docker containers are running'
              docker compose -f compose.yml ps
          
              # Test API health endpoint
              sleep 5
            else
              echo '❌ Containers are not running properly'
              docker compose -f compose.yml logs
              exit 1
            fi
          
            echo '🎉 Déploiement réussi sur EC2!'
          "

      - name: Cleanup old images on EC2
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            # Remove unused Docker images
            docker image prune -a -f --filter 'until=24h'
          
            # Show disk usage
            docker system df
          "