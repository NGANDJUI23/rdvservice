spring.application.name=rdvservice
server.port=8081
spring.datasource.url= jdbc:postgresql://localhost:5432/rdv-db
spring.datasource.username=ivan
spring.datasource.password=pkfrc
spring.datasource.driver-class-name=org.postgresql.Driver
spring.main.allow-circular-references=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.generate-dll=true
spring.jpa.open-in-view=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.tool.hbm2ddl=DEBUG



# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
#springdoc.packages-to-scan=com.example.rdv.api
#springdoc.paths-to-match=/api/**